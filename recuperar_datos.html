<script type="module">
const firebaseConfig = {

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

function mostrar(msg, tipo) {
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.className = 'status ' + tipo;
  el.innerHTML = msg;
}

window.iniciarRecuperacion = async function() {
  mostrar('🔐 Iniciando sesión con Google...', 'step');
  try {
    await signInWithPopup(auth, provider);
    const alumnas = window.DATOS.alumnos.length;
    mostrar('☁️ Subiendo ' + alumnas + ' alumnas a Firebase...', 'step');
    const ref = doc(db, 'academias', 'lazos-tricolor', 'datos', 'principal');
    await setDoc(ref, {
      data: JSON.stringify(window.DATOS),
      updatedAt: new Date().toISOString(),
      alumnas: alumnas
    });
    mostrar('🎉 <strong>¡' + alumnas + ' alumnas recuperadas exitosamente!</strong><br><br>Cierra esta pestaña y abre tu dashboard.', 'ok');
  } catch(e) {
    console.error(e);
    mostrar('❌ Error: ' + e.message, 'err');
  }
};
</script>
